<!DOCTYPE html>
<html>
<head>
    <script type="text/javascript" charset="UTF-8"
     src="./node_modules/jsxgraph/distrib/jsxgraphcore.js"></script>
    <link rel="stylesheet" type="text/css" href="./node_modules/jsxgraph/distrib/jsxgraph.css" />
</head>
<body>
<div id="box" class="jxgbox" style="width:500px; height:500px;"></div>
<script>
    var board = JXG.JSXGraph.initBoard('box', {boundingbox: [-10, 10, 10, -10], axis:true});
    // This works: board.create('functiongraph', ['sin(x)']);
    try {
        board.create('functiongraph', ['sin(x)'], {strokeColor: 'blue'});
        console.log("Success with string 'sin(x)'");
    } catch(e) {
        console.log("Failed with string", e);
    }
</script>
</body>
</html>
