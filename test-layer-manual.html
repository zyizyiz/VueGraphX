<!DOCTYPE html>
<html>
<head>
<script type="text/javascript" src="https://jsxgraph.uni-bayreuth.de/distrib/jsxgraphcore.js"></script>
</head>
<body>
<div id="box" class="jxgbox" style="width:500px; height:500px;"></div>
<script>
  var board = JXG.JSXGraph.initBoard('box', {boundingbox: [-5, 5, 5, -5], axis:true});
  var p1 = board.create('polygon', [[0,0], [2,0], [2,2], [0,2]], {fillColor:'blue'}); // 背面，先画
  var p2 = board.create('polygon', [[1,1], [3,1], [3,3], [1,3]], {fillColor:'red'}); // 正面，后画，盖住蓝色
  
  // 红色盖住了蓝色。现在我们想让蓝色跑到红色的上面。
  // JSXGraph 的 node 存在 board.renderer.container 或直接 element.rendNode
  setTimeout(() => {
    if (p1.rendNode && p1.rendNode.parentNode) {
      // 通过 DOM API 重新 append 蓝色节点，它就会由于最后挂载而到达最上层
      p1.rendNode.parentNode.appendChild(p1.rendNode);
    }
  }, 2000);
</script>
</body>
</html>
